services:
  mongodb:
    image: mongo@sha256:b8806ee8207318a30316eca72257da4c146025a80fdcdb4c597e596af9233ee3
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "127.0.0.1:${INTEGRATION_MONGO_PORT:-37017}:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "quit(db.adminCommand({ ping: 1 }).ok ? 0 : 1)"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 2s

  mongo-rs-init:
    image: mongo@sha256:b8806ee8207318a30316eca72257da4c146025a80fdcdb4c597e596af9233ee3
    depends_on:
      mongodb:
        condition: service_healthy
    entrypoint: ["bash", "-ec"]
    command:
      - |
        mongosh --quiet --host mongodb:27017 --eval '
          try {
            rs.status();
          } catch (error) {
            rs.initiate({ _id: "rs0", members: [{ _id: 0, host: "mongodb:27017" }] });
          }
          while (!db.hello().isWritablePrimary) {
            sleep(200);
          }
        '

  redis:
    image: redis@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
    ports:
      - "127.0.0.1:${INTEGRATION_REDIS_PORT:-36379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 1s
