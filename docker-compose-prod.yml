services:
  # --- CACHE ---
  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "sh", "-c", 'redis-cli -a "$$REDIS_PASSWORD" ping']
      interval: 5s
      retries: 5

  # --- APP LAYER ---
  backend:
    image: ghcr.io/danzin/photoapp-backend:latest
    container_name: backend
    restart: always
    environment: &backend-environment
      ENABLE_WORKERS: "false"
      NODE_ENV: production
      MONGODB_URI: ${MONGODB_URI}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: https://${DOMAIN_NAME},https://www.${DOMAIN_NAME}
      COOKIE_SECURE: "true"
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      - ./backend/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/health"]
      interval: 30s
      retries: 5

  frontend:
    image: ghcr.io/danzin/photoapp-frontend:latest
    container_name: frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

  # --- INFRA LAYER ---
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app-network
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME}
      ACME_EMAIL: ${ACME_EMAIL}

  prometheus:
    image: prom/prometheus:v3.0.0
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - app-network
    mem_limit: 256mb

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
    networks:
      - app-network
    depends_on:
      prometheus:
        condition: service_started
    mem_limit: 256m

  # Dedicated worker container
  backend-worker:
    image: ghcr.io/danzin/photoapp-backend:latest
    container_name: backend-worker
    restart: always
    environment:
      <<: *backend-environment
      ENABLE_API: "false"
      ENABLE_WORKERS: "true"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      - ./backend/uploads:/app/uploads

networks:
  app-network:
    driver: bridge

volumes:
  redis_data:
  caddy_data:
  caddy_config:
