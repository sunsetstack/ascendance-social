name: Build and Deploy to DigitalOcean

on:
  push:
    branches: ["master"]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/frontend.Dockerfile
          push: true
          tags: ghcr.io/sunsetstack/ascendance-frontend:latest
          build-args: |
            VITE_API_URL=/
            VITE_SOCKET_URL=/

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/backend.Dockerfile
          push: true
          tags: ghcr.io/sunsetstack/ascendance-backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to DigitalOcean via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          DEPLOY_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          envs: REDIS_PASSWORD,DEPLOY_SHA
          script_stop: true
          script: |
            set -eu

            compose() {
              if docker compose version >/dev/null 2>&1; then
                docker compose "$@"
              else
                docker-compose "$@"
              fi
            }

            cd /opt/ascendance-social
            echo "Deploying $DEPLOY_SHA as $(whoami) in $(pwd)"
            sudo -n chown -R "$(whoami):$(id -gn)" /opt/ascendance-social
            ls -ld . .git
            test -w .
            test -w .git

            touch .env
            if grep -q '^REDIS_PASSWORD=' .env; then
              sed -i "s|^REDIS_PASSWORD=.*|REDIS_PASSWORD=${REDIS_PASSWORD}|" .env
            else
              echo "REDIS_PASSWORD=${REDIS_PASSWORD}" >> .env
            fi

            git fetch origin master
            git reset --hard "$DEPLOY_SHA"
            test "$(git rev-parse HEAD)" = "$DEPLOY_SHA"
            test -s Caddyfile
            test -s docker-compose-prod.yml
            test -s frontend/nginx.conf

            compose -f docker-compose-prod.yml pull
            compose -f docker-compose-prod.yml up -d --remove-orphans
            compose -f docker-compose-prod.yml restart caddy
            docker system prune -f
