global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus monitors itself.
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  # Linux / Docker VM host metrics for Node Exporter Full.
  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100

    relabel_configs:
      - target_label: instance
        replacement: ascendance

  # Ascendance API metrics.
  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:3000

  # Ascendance worker metrics.
  - job_name: backend-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend-worker:9464

  # Redis metrics.
  - job_name: redis_exporter
    static_configs:
      - targets:
          - redis-exporter:9121

  # Docker container metrics.
  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080
