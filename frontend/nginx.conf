# WebSocket upgrade header mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# Only accept forwarded client IP headers from trusted upstream proxies.
# Direct requests with spoofed CF-Connecting-IP keep their socket remote_addr.
set_real_ip_from 127.0.0.1;
set_real_ip_from ::1;
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
set_real_ip_from fc00::/7;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;
real_ip_recursive on;

map $remote_addr $proxy_client_ip {
    default $remote_addr;
}

map $proxy_client_ip $proxy_forwarded_for {
    default $proxy_client_ip;
}

upstream backend_pool {
    zone backend_pool 64k;
    least_conn;

    # Re-resolve the backend when Docker recreates it with a new container IP.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;
    server backend:3000 resolve max_fails=3 fail_timeout=10s;
}

server {
    listen 80;
    server_name localhost; 

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Allow large file uploads 
    client_max_body_size 10M;

    # Root directory for static files built by frontend
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Standard serving of static files
    location = /sitemap.xml {
        default_type application/xml;
        try_files /sitemap.xml =404;
    }

    location = /robots.txt {
        default_type text/plain;
        try_files /robots.txt =404;
    }

    # Keep app shell fresh while aggressively caching fingerprinted static assets
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location ~* \.(?:js|mjs|css|woff2?|ttf|otf|eot|svg|ico|png|jpe?g|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ @spa;
    }

    location @spa {
        if ($uri ~* ^/(?:$|discover/?$|communities(?:/[^/]+(?:/members)?)?/?$|login/?$|forgot-password/?$|reset-password/?$|verify-email/?$|register/?$|profile/[^/]+(?:/follow)?/?$|results/?$|posts/[^/]+/?$|comments/[^/]+/?$|favorites/?$|messages/?$|notifications/?$|admin/?$)) {
            rewrite ^ /index.html break;
        }

        return 404;
    }

    location ^~ /api/uploads/ {
        rewrite ^/api/uploads/(.*)$ /uploads/$1 break;

        proxy_pass http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $proxy_client_ip;
        proxy_set_header X-Forwarded-For $proxy_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $proxy_client_ip;
    }

    # Proxy Socket.IO WebSocket connections directly to backend
    location /socket.io/ {
        proxy_pass http://backend_pool;
        proxy_http_version 1.1;

        # Critical WebSocket headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Forward real client IP
        proxy_set_header X-Real-IP $proxy_client_ip;
        proxy_set_header X-Forwarded-For $proxy_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $proxy_client_ip;

        # Timeout settings for long-lived connections
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Proxy API requests directly to the backend
    location /api/ {
        # No strip /api anymore
        proxy_pass http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $proxy_client_ip;
        proxy_set_header X-Forwarded-For $proxy_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $proxy_client_ip;

        # Proper load balancer API timeouts
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    location = /telemetry {
        proxy_pass http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $proxy_client_ip;
        proxy_set_header X-Forwarded-For $proxy_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $proxy_client_ip;
    }

    location ^~ /telemetry/ {
        proxy_pass http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $proxy_client_ip;
        proxy_set_header X-Forwarded-For $proxy_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $proxy_client_ip;
    }

}
